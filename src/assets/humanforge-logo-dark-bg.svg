<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect width="512" height="512" fill="#1a1a1a"/>
    
    <!-- Crosshair Guides -->
    <g opacity="0.3">
        <line x1="256" y1="0" x2="256" y2="512" stroke="#ffffff" stroke-width="1"/>
        <line x1="0" y1="256" x2="512" y2="256" stroke="#ffffff" stroke-width="1"/>
        
        <!-- Corner Brackets -->
        <path d="M100 100 L140 100 M100 100 L100 140" stroke="#ffffff" stroke-width="2"/>
        <path d="M412 100 L372 100 M412 100 L412 140" stroke="#ffffff" stroke-width="2"/>
        <path d="M100 412 L140 412 M100 412 L100 372" stroke="#ffffff" stroke-width="2"/>
        <path d="M412 412 L372 412 M412 412 L412 372" stroke="#ffffff" stroke-width="2"/>
    </g>

    <!-- Digital Iris -->
    <g transform="translate(256, 256)">
        <!-- Iris Lines (rotating element in app) -->
        <g>
            <line x1="0" y1="-40" x2="0" y2="-120" stroke="#ffffff" stroke-width="4" stroke-linecap="round" transform="rotate(0)"/>
            <line x1="0" y1="-40" x2="0" y2="-120" stroke="#ffffff" stroke-width="4" stroke-linecap="round" transform="rotate(15)"/>
