            <line x1="0" y1="-40" x2="0" y2="-120" stroke="#ffffff" stroke-width="4" stroke-linecap="round" transform="rotate(105)"/>
            <line x1="0" y1="-40" x2="0" y2="-120" stroke="#ffffff" stroke-width="4" stroke-linecap="round" transform="rotate(120)"/>
            <line x1="0" y1="-40" x2="0" y2="-120" stroke="#ffffff" stroke-width="4" stroke-linecap="round" transform="rotate(135)"/>
            <line x1="0" y1="-40" x2="0" y2="-120" stroke="#ffffff" stroke-width="4" stroke-linecap="round" transform="rotate(150)"/>
